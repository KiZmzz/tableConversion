name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verify OCR runtime before build
      run: |
        python -c "import onnxruntime, rapidocr; print('onnxruntime', onnxruntime.__version__); print('providers', onnxruntime.get_available_providers()); rapidocr.RapidOCR(); print('RapidOCR OK')"

    - name: Build EXE with PyInstaller
      run: |
        python -c "
        import sys
        sys.setrecursionlimit(5000)
        import PyInstaller.__main__
        from PyInstaller.utils.hooks import collect_dynamic_libs

        extra_args = []
        for package in ('onnxruntime',):
            for src, dest in collect_dynamic_libs(package):
                extra_args.extend(['--add-binary', f'{src};{dest}'])

        PyInstaller.__main__.run([
            '--noconfirm',
            '--onedir',
            '--windowed',
            '--name', 'TableConversion',
            '--icon', 'app.ico',
            '--hidden-import', 'PyQt5.QtPrintSupport',
            '--hidden-import', 'qfluentwidgets',
            '--hidden-import', 'rapidocr',
            '--hidden-import', 'onnxruntime',
            '--hidden-import', 'openpyxl',
            '--hidden-import', 'pdfplumber',
            '--hidden-import', 'shapely',
            '--collect-all', 'qfluentwidgets',
            '--collect-all', 'rapidocr',
            '--collect-all', 'onnxruntime',
            '--collect-all', 'pdfplumber',
            '--collect-all', 'shapely',
            '--copy-metadata', 'PyQt-Fluent-Widgets',
            '--copy-metadata', 'rapidocr',
            '--copy-metadata', 'onnxruntime',
            *extra_args,
            'main.py'
        ])
        "

    - name: Verify packaged OCR runtime
      run: |
        dist\TableConversion\TableConversion.exe --help

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TableConversion-Windows-EXE
        path: dist
