name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许在网页上点击手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node.js 20 警告

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # 使用纯英文名称避免 Windows GitHub runner 上的中文路径乱码/找不到文件错误
        pyinstaller --noconfirm --onedir --windowed --name "TableConversion" --hidden-import="paddle" --hidden-import="paddleocr" --hidden-import="rapidocr_onnxruntime" --collect-all "customtkinter" --collect-all "paddleocr" main.py

    - name: Zip the build folder
      run: |
        Compress-Archive -Path dist/TableConversion -DestinationPath dist/TableConversion_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TableConversion-Windows-EXE
        path: dist/TableConversion_Windows.zip
