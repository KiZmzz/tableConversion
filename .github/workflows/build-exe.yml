name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许在网页上点击手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # 必须使用 --onedir 模式，否则 PaddlePaddle 解压巨慢
        pyinstaller --noconfirm --onedir --windowed --name "PDF表格转Excel工具" --hidden-import="paddle" --hidden-import="paddleocr" --hidden-import="rapidocr_onnxruntime" --collect-all "customtkinter" --collect-all "paddleocr" main.py

    - name: Zip the build folder
      run: |
        Compress-Archive -Path dist/PDF表格转Excel工具 -DestinationPath dist/PDF表格转Excel工具_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF表格转Excel工具-Windows
        path: dist/PDF表格转Excel工具_Windows.zip
