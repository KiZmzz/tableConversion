name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verify runtime imports before build
      run: |
        python -c "import onnxruntime, rapidocr, fitz, docx; print('onnxruntime', onnxruntime.__version__); print('providers', onnxruntime.get_available_providers()); print('PyMuPDF', fitz.version); print('python-docx OK'); rapidocr.RapidOCR(); print('RapidOCR OK')"

    - name: Build EXE with PyInstaller
      run: |
        python scripts/build_windows_exe.py

    - name: Verify packaged OCR runtime
      run: |
        $p = Start-Process -FilePath "dist\TableConversion\TableConversion.exe" -ArgumentList "--self-test-ocr" -Wait -PassThru
        if ($p.ExitCode -ne 0) { exit $p.ExitCode }

    - name: Verify packaged PDF to Word OCR
      run: |
        python -c "import fitz; doc=fitz.open(); page=doc.new_page(width=595,height=842); page.insert_text((72,120),'Packaged OCR Smoke Test 123', fontsize=32); doc.save('ocr_smoke.pdf')"
        $p = Start-Process -FilePath "dist\TableConversion\TableConversion.exe" -ArgumentList "word", "ocr_smoke.pdf", "-o", "ocr_smoke.docx", "--dpi", "200" -Wait -PassThru
        if ($p.ExitCode -ne 0) { exit $p.ExitCode }
        python -c "from docx import Document; text='\n'.join(p.text for p in Document('ocr_smoke.docx').paragraphs); print(text); assert 'Smoke Test' in text and '123' in text"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TableConversion-Windows-EXE
        path: dist
