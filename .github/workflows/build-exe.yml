name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许在网页上点击手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node.js 20 警告

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        python -c "
        import sys
        sys.setrecursionlimit(5000)
        import PyInstaller.__main__
        PyInstaller.__main__.run([
            '--noconfirm',
            '--onedir',
            '--windowed',
            '--name', 'TableConversion',
            '--hidden-import', 'paddle',
            '--hidden-import', 'paddleocr',
            '--hidden-import', 'rapidocr_onnxruntime',
            '--collect-all', 'customtkinter',
            '--collect-all', 'paddleocr',
            'main.py'
        ])
        "

    - name: Zip the build folder
      run: |
        # 使用 7z 替代 PowerShell 自带的 Compress-Archive，避免 2GB 大小限制导致崩溃，且速度快10倍
        7z a -tzip dist/TableConversion_Windows.zip ./dist/TableConversion/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TableConversion-Windows-EXE
        path: dist/TableConversion_Windows.zip
